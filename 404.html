<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecionando...</title>
    <script>
      // Salva a URL inteira que o usuário tentou acessar na memória temporária
      sessionStorage.redirect = location.href;
      
      // Joga o usuário de volta para a raiz do site (index.html) instantaneamente
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
