<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMVS Digital</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f4f5f7; }
    iframe { width: 100%; height: 100vh; border: none; display: block; }
  </style>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>
  <iframe id="appFrame" allow="geolocation; camera; microphone" allowfullscreen></iframe>

  <script>
    const baseUrlAppsScript = "https://script.google.com/macros/s/AKfycbxBTCIRi8IjBt92IPFFAXG4HTcX5c9GF0eJjgfyry5ehA9tDgvscJelmk3ktfkHWuvJ/exec";

    // ── OneSignal ─────────────────────────────────────
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "d0db32c7-befc-419e-a2f2-0c2e1ca73959",
        autoPrompt: false,
        promptOptions: {
          slidedown: {
            prompts: [{
              type: "push",
              autoPrompt: false,
              text: {
                actionMessage: "Receba notificações sobre suas atividades e demandas do AMVS Digital.",
                acceptButton: "Permitir",
                cancelButton: "Agora não"
              }
            }]
          }
        }
      });

      async function enviarPlayerIdAoGAS(playerId) {
        if (!playerId) return;
        await fetch(baseUrlAppsScript, {
          method: "POST", mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ acao: "salvarPlayerId", playerId })
        });
      }

      const playerIdAtual = OneSignal.User.PushSubscription.id;
      if (playerIdAtual && OneSignal.User.PushSubscription.optedIn) {
        enviarPlayerIdAoGAS(playerIdAtual);
      }

      OneSignal.User.PushSubscription.addEventListener("change", function(e) {
        if (e.current.optedIn) enviarPlayerIdAoGAS(e.current.id);
      });
    });

    // ── Listener único (URL + login) ──────────────────
    window.addEventListener('message', function(event) {
  // Debug — mostra TODAS as mensagens recebidas
  console.log("📨 postMessage recebido:", event.data);

  // 1. Atualiza a URL ao navegar
  if (event.data?.sistema === 'AMVS_DIGITAL' && event.data?.acao === 'MUDAR_URL') {
    const novoCaminho = '/' + event.data.caminho;
    if (window.location.pathname !== novoCaminho) {
      window.history.pushState(null, null, novoCaminho);
    }

    console.log("🔀 Rota detectada:", event.data.caminho);

    const rotasAutenticadas = ['busca', 'dashboard', 'processos', 'atividades'];
    if (rotasAutenticadas.includes(event.data.caminho)) {
      console.log("✅ Rota autenticada! Tentando exibir prompt...");
      OneSignalDeferred.push(function(OneSignal) {
        console.log("🔔 optedIn:", OneSignal.User.PushSubscription.optedIn);
        if (!OneSignal.User.PushSubscription.optedIn) {
          OneSignal.Slidedown.promptPush();
        } else {
          console.log("⚠️ Usuário já está inscrito, prompt não exibido.");
        }
      });
    }
  }
});

    // ── Carregamento do iframe ────────────────────────
    window.onload = function() {
      let path = "";
      let redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        window.history.replaceState(null, null, redirect);
        path = new URL(redirect).pathname.substring(1).replace(/\/$/, "");
      } else {
        path = window.location.pathname.substring(1).replace(/\/$/, "");
      }
      const iframe = document.getElementById('appFrame');
      iframe.src = path ? baseUrlAppsScript + "?page=" + path : baseUrlAppsScript;
    };
  </script>
</body>
</html>
