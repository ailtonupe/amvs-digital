<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMVS Digital</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f4f5f7; }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    id="appFrame"
    allow="geolocation; camera; microphone"
    allowfullscreen>
  </iframe>

  <script>
    // URL base do seu Web App no Apps Script
    const baseUrlAppsScript = "https://script.google.com/macros/s/AKfycbxBTCIRi8IjBt92IPFFAXG4HTcX5c9GF0eJjgfyry5ehA9tDgvscJelmk3ktfkHWuvJ/exec";

    // 1. LÓGICA DE ENTRADA: Lê a URL do navegador e monta o iframe
    window.onload = function() {
        // Pega o caminho após o domínio (ex: de "site.com/processos" pega "processos")
        // O substring(1) remove a barra inicial "/"
        let path = window.location.pathname.substring(1);
        
        // Remove eventuais barras no final para limpar a string
        path = path.replace(/\/$/, "");

        const iframe = document.getElementById('appFrame');

        // Se o usuário digitou uma rota (ex: /dashboard), passa o parâmetro. Senão, carrega a raiz pura.
        if (path) {
            iframe.src = baseUrlAppsScript + "?page=" + path;
        } else {
            iframe.src = baseUrlAppsScript;
        }
    };

    // 2. LÓGICA DE NAVEGAÇÃO: Escuta o Apps Script para mudar a URL visualmente quando o usuário clica nos menus
    window.addEventListener('message', function(event) {
        // Validação de segurança
        if (event.data && event.data.sistema === 'AMVS_DIGITAL' && event.data.acao === 'MUDAR_URL') {
            
            const novoCaminho = '/' + event.data.caminho;
            
            // Só altera se for diferente do atual para não bugar o histórico
            if (window.location.pathname !== novoCaminho) {
                // Muda a URL no navegador do celular/PC sem recarregar a tela!
                window.history.pushState({ path: novoCaminho }, "", novoCaminho);
            }
        }
    });
  </script>
</body>
</html>
