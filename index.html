<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMVS Digital</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f4f5f7; }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    id="appFrame"
    allow="geolocation; camera; microphone"
    allowfullscreen>
  </iframe>

  <script>
    // URL base do seu Web App no Apps Script
    const baseUrlAppsScript = "https://script.google.com/macros/s/AKfycbxBTCIRi8IjBt92IPFFAXG4HTcX5c9GF0eJjgfyry5ehA9tDgvscJelmk3ktfkHWuvJ/exec";

    // 1. LÓGICA DE INTERCEPTAÇÃO E CARREGAMENTO
    window.onload = function() {
        let path = "";
        
        // Verifica se viemos de um redirecionamento do 404.html
        let redirect = sessionStorage.redirect;
        delete sessionStorage.redirect; // Limpa a memória imediatamente após ler

        if (redirect && redirect !== location.href) {
            // Se viemos do 404, reescrevemos a URL na barra de endereços para a original (ex: /dashboard)
            window.history.replaceState(null, null, redirect);
            
            // Extraímos a rota para passar pro Apps Script
            let urlObj = new URL(redirect);
            path = urlObj.pathname.substring(1).replace(/\/$/, "");
        } else {
            // Se o usuário entrou direto pela raiz (amvsdigital.com.br/)
            path = window.location.pathname.substring(1).replace(/\/$/, "");
        }

        // Injeta a URL correta no iframe
        const iframe = document.getElementById('appFrame');
        if (path) {
            iframe.src = baseUrlAppsScript + "?page=" + path;
        } else {
            iframe.src = baseUrlAppsScript;
        }
    };

    // 2. COMUNICAÇÃO COM O APPS SCRIPT (Atualiza a URL enquanto o usuário navega)
    window.addEventListener('message', function(event) {
        if (event.data && event.data.sistema === 'AMVS_DIGITAL' && event.data.acao === 'MUDAR_URL') {
            const novoCaminho = '/' + event.data.caminho;
            
            if (window.location.pathname !== novoCaminho) {
                // Atualiza a barra de endereço sem recarregar a tela
                window.history.pushState(null, null, novoCaminho);
            }
        }
    });
  </script>
</body>
</html>
